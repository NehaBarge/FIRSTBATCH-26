<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 2</title>
</head>
<body>
    <div>
        <!---Block Level Element
         
        it occupies the complete row of webpage
        div is also known as division tag
        you can provide height and width customization
        Nesting of HTML elements is possible
        -->

        <div style="background-color:rgb(197, 42, 174); width :200px;height :200px;"> Div 1</div>
        <div style="background-color:rgb(215, 250, 227);"> Div 2</div>
        <div style="background-color:aqua";> Div 3</div>
        
        <!---Inline Element
        
        it occupies the content space only
        span tag can only have text values
        so,height and width customization is not possible
        Nesting of element is not possible as it holds only text values--->

        <span style="background-color:rgb(99, 48, 48)"> Span 1 </span>
        <span style="border-color:rgb(93, 38, 145)"> Span 2 </span>
        <span style="background-color:blue"> Span 3 </span>
    </div>
</body>
</html>
